<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Miradas 2026</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cormorant Garamond', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Playfair Display', serif; }
        #map-general, #map-detail { border-radius: 1rem; filter: grayscale(1) contrast(1.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .welcome-bg { 
            background: linear-gradient(rgba(253, 253, 251, 0.95), rgba(253, 253, 251, 0.8)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/e/ea/Plano_de_la_Ciudad_de_Buenos_Aires_-_1900.jpg') center/cover;
            background-blend-mode: grayscale;
        }
        .retro-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            opacity: 0.15;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-white text-black">
    <div class="retro-overlay"></div>
 
    <!-- PANTALLA DE BIENVENIDA -->
    <section id="tab-home" class="tab-content active h-screen flex flex-col items-center justify-center text-center welcome-bg px-6">
        <div class="space-y-4 mb-12 pt-20">
            <h1 id="main-title" class="text-[clamp(4rem,20vw,12rem)] font-bold tracking-tighter leading-[0.8] text-black flex justify-center select-none">
                <span class="letter group relative" data-letter="M" style="--img: url('https://picsum.photos/seed/m-arch/400/600?grayscale')">M</span>
                <span class="letter group relative" data-letter="I" style="--img: url('https://picsum.photos/seed/i-arch/400/600?grayscale')">I</span>
                <span class="letter group relative" data-letter="R" style="--img: url('https://picsum.photos/seed/r-arch/400/600?grayscale')">R</span>
                <span class="letter group relative" data-letter="A" style="--img: url('https://picsum.photos/seed/a-arch/400/600?grayscale')">A</span>
                <span class="letter group relative" data-letter="D" style="--img: url('https://picsum.photos/seed/d-arch/400/600?grayscale')">D</span>
                <span class="letter group relative" data-letter="A" style="--img: url('https://picsum.photos/seed/a2-arch/400/600?grayscale')">A</span>
                <span class="letter group relative" data-letter="S" style="--img: url('https://picsum.photos/seed/s-arch/400/600?grayscale')">S</span>
            </h1>

            <style>
                .letter {
                    position: relative;
                    color: #000;
                    transition: color 0.3s;
                }
                .letter::before {
                    content: attr(data-letter);
                    position: absolute;
                    inset: 0;
                    color: transparent;
                    background-image: var(--img);
                    background-size: cover;
                    background-position: center;
                    -webkit-background-clip: text;
                    background-clip: text;
                    opacity: 0;
                    transition: opacity 0.5s;
                    pointer-events: none;
                    /* Mask that follows the mouse via CSS variables */
                    -webkit-mask-image: radial-gradient(circle 120px at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 100%);
                    mask-image: radial-gradient(circle 120px at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 100%);
                }
                .letter:hover {
                    color: rgba(0,0,0,0.1);
                }
                .letter:hover::before {
                    opacity: 1;
                }
            </style>

            <script>
                document.getElementById('main-title').addEventListener('mousemove', (e) => {
                    const letters = e.currentTarget.querySelectorAll('.letter');
                    letters.forEach(letter => {
                        const rect = letter.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        letter.style.setProperty('--mouse-x', `${x}px`);
                        letter.style.setProperty('--mouse-y', `${y}px`);
                    });
                });
            </script>
            <div class="h-px w-32 bg-black/10 mx-auto"></div>
            <p class="text-sm md:text-lg opacity-40 italic font-sans uppercase tracking-[0.6em]">Patrimonio Arquitectónico de Buenos Aires</p>
        </div>
        <div id="years-container" class="flex flex-col xl:flex-row gap-12 xl:gap-24 items-center justify-center relative z-10 pt-10">
            <!-- Populado dinámicamente por app.js desde Google Sheets -->
        </div>
    </section>

    <!-- VISTA PÚBLICA (MAPA PRINCIPAL) -->
    <section id="tab-publico" class="tab-content min-h-screen">
        <header id="main-header" class="h-[64px] px-6 lg:px-10 border-b border-gray-100 flex justify-between items-center fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-md z-[100] transition-transform duration-500">
            <button onclick="showTab('tab-home')" class="text-xl font-bold tracking-tighter shrink-0">MIRADAS '26</button>
            <div class="flex-1 max-w-lg w-full relative search-container px-4">
                <div class="relative">
                    <input id="search-input" type="text" placeholder="Buscar hito..." 
                        class="w-full bg-gray-50 px-6 py-2.5 rounded-xl font-sans text-xs outline-none focus:ring-1 focus:ring-black/5 transition-all" 
                        oninput="handleSearch()"
                        onfocus="showSuggestions()"
                        autocomplete="off">
                </div>
                <!-- Sugerencias -->
                <div id="search-suggestions" class="hidden absolute top-full left-4 right-4 bg-white mt-1 rounded-xl shadow-xl border border-gray-100 overflow-hidden z-50">
                    <!-- Inyectado por JS -->
                </div>
            </div>
            <div class="w-32 hidden md:block"></div> <!-- Spacer for symmetry -->
        </header>

        <main class="max-w-full mx-auto">
            <div id="main-split-container" class="flex flex-col lg:flex-row h-screen transition-all duration-700 ease-in-out">
                
                <!-- Columna Izquierda: Grid de Edificios -->
                <div id="grid-container" class="flex-1 h-full overflow-y-auto p-6 lg:p-10 pt-[80px] lg:pt-[100px] transition-all duration-700 scroll-smooth">
                    <div id="buildings-public-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-12">
                        <!-- Tarjetas inyectadas -->
                    </div>
                    
                    <!-- Mapa General (Solo en el listado) -->
                    <div id="general-map-container" class="mt-32 pb-20 space-y-12 animate-in fade-in duration-1000">
                        <div class="h-[1px] w-full bg-gray-100"></div>
                        <h2 class="text-6xl font-bold tracking-tight text-center">Cartografía del Patrimonio</h2>
                        <div id="map-general" class="h-[600px] w-full shadow-inner bg-gray-50 border border-gray-100 rounded-[3rem]"></div>
                        <p class="font-sans text-[10px] uppercase tracking-widest text-gray-400 text-center">Explora la distribución espacial de los hitos arquitectónicos</p>
                    </div>
                </div>
 
                <!-- Resizer Handle (Minimal) -->
                <div id="split-resizer" class="hidden lg:flex w-1 hover:w-1.5 bg-gray-100 hover:bg-black cursor-col-resize transition-all z-50 items-center justify-center group active:bg-black">
                    <div class="h-32 w-px bg-black/5 group-hover:bg-white/20"></div>
                </div>

                <div id="detail-panel" class="hidden w-full lg:w-[60%] border-l border-gray-100 bg-white h-full overflow-y-auto animate-in slide-in-from-right-full duration-700 scroll-smooth z-30 pt-[64px]">
                    <div id="detail-content" class="px-6 md:px-[6vw] lg:px-[8vw] py-4 space-y-4">
                        <!-- Inyectado por JS -->
                    </div>
                </div>
            </div>
        </main>
    </section>

    <!-- FULLSCREEN IMAGE OVERLAY -->
    <div id="fullscreen-overlay" class="fixed inset-0 z-[200] bg-black opacity-0 pointer-events-none transition-opacity duration-500 flex flex-col items-center justify-center">
        <div class="absolute top-0 left-0 px-6 px-10 py-4 flex justify-between items-center z-10 w-full bg-linear-to-b from-black/50 to-transparent">
            <div id="fullscreen-info" class="font-sans text-[10px] uppercase tracking-[0.4em] text-white/50 font-bold"></div>
            <button onclick="closeFullscreen()" class="font-sans text-[10px] uppercase tracking-[0.4em] font-bold text-white/50 hover:text-white transition-all cursor-pointer flex items-center gap-4 group">
                <span class="opacity-0 group-hover:opacity-100 transition-opacity duration-300">Cerrar ventana</span>
                <span class="text-2xl font-light">✕</span>
            </button>
        </div>
        <div class="w-full h-full relative flex items-center justify-center overflow-hidden">
             <div id="fullscreen-track" class="flex transition-transform duration-700 cubic-bezier(0.16, 1, 0.3, 1) h-full w-full">
                 <!-- Photos injected here -->
             </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
